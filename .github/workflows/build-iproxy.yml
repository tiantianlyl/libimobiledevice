name: 编译iproxy单文件exe
on:
  workflow_dispatch: # 允许手动点击触发

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装MSVC编译器
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: 安装CMake
        uses: lukka/get-cmake@latest

      - name: 编译所有依赖和iproxy
        run: |
          # 创建统一的工作目录（所有编译都在这里进行，避免路径冲突）
          mkdir build
          cd build

          # 1. 编译第一个依赖：libplist（指定稳定版本2.6.0，避免master分支不稳定）
          git clone --branch 2.6.0 https://github.com/libimobiledevice/libplist.git
          cd libplist
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build . --config Release
          cmake --install . --prefix ../../install
          cd ../..

          # 2. 编译第二个依赖：libimobiledevice-glue（新增，必须先编译这个）
          git clone --branch 1.2.0 https://github.com/libimobiledevice/libimobiledevice-glue.git
          cd libimobiledevice-glue
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DCMAKE_PREFIX_PATH=../../install
          cmake --build . --config Release
          cmake --install . --prefix ../../install
          cd ../..

          # 3. 编译第三个依赖：libusbmuxd
          git clone --branch 2.0.2 https://github.com/libimobiledevice/libusbmuxd.git
          cd libusbmuxd
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DCMAKE_PREFIX_PATH=../../install
          cmake --build . --config Release
          cmake --install . --prefix ../../install
          cd ../..

          # 4. 编译主项目和iproxy（直接在当前build目录编译，不再重复创建）
          cmake .. -G "Visual Studio 17 2022" -A x64 -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded -DCMAKE_PREFIX_PATH=./install
          cmake --build . --config Release

      - name: 上传单文件exe
        uses: actions/upload-artifact@v4
        with:
          name: iproxy-portable.exe
          path: build/Release/iproxy.exe
